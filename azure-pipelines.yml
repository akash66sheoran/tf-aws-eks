trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - stage
      - prod

  - name: action
    displayName: Terraform Action
    type: string
    default: plan
    values:
      - plan
      - apply
      - destroy

variables:
  - name: terraformVersion
    value: '1.14.9'

  - name: awsRegion
    value: 'ap-south-1'

  - name: aws.rolecredential.maxduration
    value: '3600'

  - ${{ if eq(parameters.environment, 'dev') }}:
      - name: awsServiceConnection
        value: 'aws-eks-dev-svc'

  - ${{ if eq(parameters.environment, 'stage') }}:
      - name: awsServiceConnection
        value: 'aws-eks-stage-svc'

  - ${{ if eq(parameters.environment, 'prod') }}:
      - name: awsServiceConnection
        value: 'aws-eks-prod-svc'

stages:
  - stage: TerraformPlan
    displayName: Terraform Plan
    jobs:
      - job: Plan
        displayName: Plan ${{ parameters.environment }}
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AWSShellScript@1
            displayName: Terraform fmt, init, validate, plan
            inputs:
              awsCredentials: $(awsServiceConnection)
              regionName: $(awsRegion)
              scriptType: 'inline'
              inlineScript: |
                set -euo pipefail
                
                cd envs/${{ parameters.environment }}

                terraform fmt -check -recursive

                terraform init -input=false

                terraform validate

                terraform plan \
                  -input=false \
                  -var-file="terraform.tfvars" \
                  -out=tfplan

          - publish: envs/${{ parameters.environment }}/tfplan
            artifact: terraform-plan
            displayName: Publish Terraform plan
            condition: ne('${{ parameters.action }}', 'destroy')

  - stage: TerraformApply
    displayName: Terraform Apply
    dependsOn: TerraformPlan
    condition: and(succeeded(), eq('${{ parameters.action }}', 'apply'))
    jobs:
      - deployment: Apply
        displayName: Apply ${{ parameters.environment }}
        environment: eks-${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: terraform-plan

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: AWSShellScript@1
                  displayName: Terraform Apply
                  inputs:
                    awsCredentials: $(awsServiceConnection)
                    regionName: $(awsRegion)
                    scriptType: 'inline'
                    inlineScript: |
                      set -euo pipefail

                      aws sts get-caller-identity

                      cd envs/${{ parameters.environment }}

                      terraform init

                      terraform apply -auto-approve "$(Pipeline.Workspace)/terraform-plan/tfplan"

  - stage: TerraformDestroy
    displayName: Terraform Destroy
    condition: eq('${{ parameters.action }}', 'destroy')
    jobs:
      - deployment: Destroy
        displayName: Destroy ${{ parameters.environment }}
        environment: eks-${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: AWSShellScript@1
                  displayName: Terraform destroy
                  inputs:
                    awsCredentials: $(awsServiceConnection)
                    regionName: $(awsRegion)
                    scriptType: 'inline'
                    inlineScript: |
                      set -euo pipefail

                      aws sts get-caller-identity

                      cd envs/${{ parameters.environment }}

                      terraform init

                      terraform destroy \
                        -var-file="terraform.tfvars" \
                        -auto-approve